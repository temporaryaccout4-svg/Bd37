<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

/* SCREEN */
.screen{
  display:none;
  width:100vw;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.show{display:flex;}

/* PREMIUM INPUT */
input{
  padding:14px;
  width:70%;
  border-radius:20px;
  border:2px solid #ff4d6d;
  background:black;
  color:white;
  font-size:16px;
  outline:none;
  box-shadow:0 0 10px #ff4d6d;
}

/* SHAKE */
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
.shake{animation:shake 0.3s;}

/* BUTTON */
button{
  padding:14px 26px;
  border-radius:25px;
  border:none;
  background:linear-gradient(45deg,#ff4d6d,#6cf);
  color:white;
  margin-top:10px;
}

/* PHOTO */
#photo{
  width:70vw;
  height:70vw;
  object-fit:cover;
  border-radius:20px;
}

/* TEXT */
#wish{
  font-size:4vw;
  line-height:1.6;
}

/* HEARTS */
.heart{
  position:absolute;
  animation:float 6s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* COUNT */
#count{font-size:22vw;}

/* ROAM BUTTON */
#yesBtn{position:relative;}
@keyframes roam{
  0%{transform:translate(0);}
  25%{transform:translate(60px,-40px);}
  50%{transform:translate(-60px,40px);}
  75%{transform:translate(60px,60px);}
  100%{transform:translate(0);}
}
.roaming{animation:roam 0.25s infinite linear;}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
}
.flash.active{animation:flash 0.5s;}
@keyframes flash{
  from{opacity:1;}
  to{opacity:0;}
}

/* PROPOSAL */
#proposalImg{
  width:90%;
  opacity:0;
  transform:translateY(150px) scale(0.6);
  transition:all 3s ease;
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<!-- LOGIN -->
<div id="login" class="screen show">
  <h2>🔐 Enter Password</h2>
  <input id="passInput" placeholder="Enter password">
  <p id="error" style="color:red;"></p>
  <button onclick="unlock()">Unlock</button>
</div>

<!-- MAIN -->
<div id="main" class="screen">
  <img id="photo" src="photo1.jpg">
  <p id="wish"></p>
  <button onclick="start()">Tap 💖</button>
</div>

<!-- COUNT -->
<div id="countScreen" class="screen">
  <h1 id="count">5</h1>
</div>

<!-- READY -->
<div id="readyScreen" class="screen">
  <h2>Are you ready? 💖</h2>
  <button id="yesBtn" onclick="goNext()">Yes 💕</button>
</div>

<!-- WAIT -->
<div id="waitScreen" class="screen">
  <h2 id="waitText">💌 Something special is coming...</h2>
  <p id="funText"></p>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="screen">
  <img id="proposalImg" src="proposal-card.jpg">
</div>

<audio id="boom" src="boom.mp3"></audio>
<audio id="music" src="makhamali.mp3"></audio>

<script>

const boom=document.getElementById("boom");
const music=document.getElementById("music");

/* SCREEN */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

/* PASSWORD */
const input=document.getElementById("passInput");
const error=document.getElementById("error");

input.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") unlock();
});

function unlock(){
  let val=input.value.trim().toLowerCase();

  if(val==="angry bird"){
    error.innerText="";
    boom.currentTime=0;
    boom.play().catch(()=>{});
    show("main");
    typeText();
    createHearts();
  }else{
    error.innerText="Wrong password 💔";
    input.classList.add("shake");
    setTimeout(()=>input.classList.remove("shake"),300);
  }
}

/* TEXT */
let text=`Wishing you a very happy and joyful birthday 🎂💗
May your life always be filled with happiness, love, and success.
May all your dreams and wishes come true.
It’s not just your birthday… it’s the day someone special like you came into this world and made my life better in many ways.
You’ve become someone really special to me. Stay the same, my favourite Angry Bird 🐦❤️
Once again, happy birthday to my special person 💗✨`;

let i=0;
function typeText(){
  let box=document.getElementById("wish");
  box.innerHTML="";
  let t=setInterval(()=>{
    box.innerHTML+=text.charAt(i++);
    if(i>=text.length) clearInterval(t);
  },60);
}

/* PHOTO SLIDER */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];
setInterval(()=>{
  let img=document.getElementById("photo");
  if(img) img.src=photos[Math.floor(Math.random()*photos.length)];
},2500);

/* HEARTS */
function createHearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💗";
    h.style.left=Math.random()*100+"%";
    h.style.fontSize=(15+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);
}

/* START */
function start(){
  boom.pause();
  boom.currentTime=0;

  show("countScreen");

  let c=5;
  let t=setInterval(()=>{
    c--;
    count.innerText=c;

    if(c==0){
      clearInterval(t);
      music.play().catch(()=>{});
      show("readyScreen");
      roamBtn();
    }
  },1000);
}

/* ROAM */
function roamBtn(){
  yesBtn.classList.add("roaming");
  setTimeout(()=>yesBtn.classList.remove("roaming"),5000);
}

/* WAIT FUN */
let funny=[
  "Wait 😏 something big is coming...",
  "Don't blink 👀",
  "Heart beating fast? 💓",
  "Almost there 😌"
];

function goNext(){
  show("waitScreen");

  let i=0;
  setInterval(()=>{
    funText.innerText=funny[i%funny.length];
    i++;
  },2000);

  setTimeout(()=>climax(),20000);
}

/* CLIMAX */
function climax(){
  flash.classList.add("active");
  setTimeout(()=>showProposal(),500);
}

/* PROPOSAL */
function showProposal(){
  show("proposal");

  let img=proposalImg;

  let roam=0;
  let r=setInterval(()=>{
    img.style.opacity="0.5";
    img.style.transform=`translate(${Math.random()*40-20}px,${Math.random()*40-20}px) scale(0.7)`;

    if(++roam>7){
      clearInterval(r);

      setTimeout(()=>{
        img.style.opacity="1";
        img.style.transform="translate(0,0) scale(1)";
      },300);
    }
  },200);
}

</script>
</body>
</html>
